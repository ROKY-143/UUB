<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROKY ULTRA | CLOUD CONTROL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg: #0a0f1e; --card: #161b33; --cyan: #00f2ff; --pink: #ff007a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        /* Login Center */
        .login-screen { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background: var(--card); padding: 35px; border-radius: 20px; box-shadow: 0 0 25px rgba(0, 242, 255, 0.2); border: 1px solid var(--cyan); width: 320px; text-align: center; }
        
        /* Dashboard Layout */
        .dashboard { display: none; padding: 20px; }
        .nav { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--cyan); margin-bottom: 20px; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 12px; border-left: 4px solid var(--cyan); text-align: center; }
        
        .form-box { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #2a2f45; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0a0f1e; color: white; box-sizing: border-box; }
        input:focus { border-color: var(--cyan); outline: none; }
        
        .btn-prime { width: 100%; background: linear-gradient(45deg, var(--cyan), #0072ff); color: #000; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; box-shadow: 0 4px 15px rgba(0, 242, 255, 0.3); }
        
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #2a2f45; font-size: 13px; }
        th { background: #1f2544; color: var(--cyan); text-transform: uppercase; }
        .del-icon { color: var(--pink); cursor: pointer; font-size: 18px; }
        .status-tag { background: rgba(0, 255, 122, 0.1); color: #00ff7a; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
    </style>
</head>
<body>

    <div id="loginPage" class="login-screen">
        <div class="box">
            <i class="fas fa-user-shield" style="font-size: 50px; color: var(--cyan); margin-bottom: 15px;"></i>
            <h2 style="margin: 0; letter-spacing: 2px;">ROKY ADMIN</h2>
            <p style="color: #888; font-size: 13px;">Cloud Approval System</p>
            <input type="password" id="secretCode" placeholder="Enter Secret Code">
            <button class="btn-prime" onclick="checkLogin()">UNLOCK PANEL</button>
        </div>
    </div>

    <div id="dashboardPage" class="dashboard">
        <div class="nav">
            <div style="color: var(--cyan); font-weight: bold; font-size: 20px;"><i class="fas fa-bolt"></i> ROKY ULTRA</div>
            <button onclick="location.reload()" style="background:none; border:1px solid var(--pink); color:var(--pink); padding:5px 10px; border-radius:5px; cursor:pointer;">Logout</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div style="font-size: 12px; color: #888;">ACTIVE BOTS</div>
                <div id="botCount" style="font-size: 24px; font-weight: bold; color: var(--cyan);">0</div>
            </div>
            <div class="stat-card" style="border-left-color: #4ade80;">
                <div style="font-size: 12px; color: #888;">CLOUD STATUS</div>
                <div style="font-size: 16px; font-weight: bold; color: #4ade80; margin-top: 5px;"><i class="fas fa-signal"></i> ONLINE</div>
            </div>
        </div>

        <div class="form-box">
            <h3 style="margin-top: 0; color: var(--cyan);"><i class="fas fa-plus-circle"></i> Approve New Owner</h3>
            <input type="text" id="ownerId" placeholder="Owner Telegram ID (e.g. 8229228484)">
            <input type="text" id="botToken" placeholder="Bot Token">
            <input type="number" id="validDays" placeholder="Validity Days (e.g. 30)">
            <button class="btn-prime" onclick="approveToCloud()">APPROVE TO CLOUD</button>
        </div>

        <h3 style="text-align: left; margin-left: 5px;"><i class="fas fa-list"></i> Managed Owners</h3>
        <table>
            <thead>
                <tr>
                    <th>Owner ID</th>
                    <th>Expiry Date</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="ownerTable">
                </tbody>
        </table>
    </div>

    <script>
        // ---  Firebase  ---
        const firebaseConfig = {
            databaseURL: "https://cokesbotadmin-default-rtdb.firebaseio.com/" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function checkLogin() {
            const code = document.getElementById('secretCode').value;
            if(code === "ROKY-009") {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboardPage').style.display = 'block';
                fetchFromCloud();
            } else {
                alert("Wrong Code! access denied.");
            }
        }

        function approveToCloud() {
            const id = document.getElementById('ownerId').value.trim();
            const token = document.getElementById('botToken').value.trim();
            const days = parseInt(document.getElementById('validDays').value);
            
            if(!id || !token || !days) {
                alert("Please fill all fields!");
                return;
            }

            let expiryDate = new Date();
            expiryDate.setDate(expiryDate.getDate() + days);
            const dateStr = expiryDate.toISOString().split('T')[0];

            db.ref('owners/' + id).set({
                token: token,
                expiry: dateStr,
                status: "active",
                approved_at: new Date().toLocaleString()
            }, (error) => {
                if(!error) {
                    alert(" Owner Approved Successfully!");
                    document.getElementById('ownerId').value = "";
                    document.getElementById('botToken').value = "";
                    document.getElementById('validDays').value = "";
                } else {
                    alert(" Error: " + error);
                }
            });
        }

        function fetchFromCloud() {
            db.ref('owners').on('value', (snapshot) => {
                const data = snapshot.val();
                const table = document.getElementById('ownerTable');
                table.innerHTML = "";
                let count = 0;
                
                if(data) {
                    for(let id in data) {
                        count++;
                        table.innerHTML += `
                            <tr>
                                <td><i class="fas fa-user-circle" style="color:#888"></i> ${id}</td>
                                <td><span class="status-tag">${data[id].expiry}</span></td>
                                <td style="text-align:center;">
                                    <i class="fas fa-trash-alt del-icon" onclick="removeFromCloud('${id}')"></i>
                                </td>
                            </tr>
                        `;
                    }
                }
                document.getElementById('botCount').innerText = count;
            });
        }

        function removeFromCloud(id) {
            if(confirm("Are you sure to remove this owner's access?")) {
                db.ref('owners/' + id).remove();
            }
        }
    </script>
</body>
</html>
